<!DOCTYPE html>
<html>
<head>
  <title>HabitTracker — Scan with Expo Go</title>
  <meta name="viewport" content="width=device-width">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1A1A2E; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; color: #fff; padding: 24px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p { color: #9CA3AF; font-size: 13px; margin-bottom: 24px; text-align: center; line-height: 1.6; }
    canvas { border-radius: 12px; }
    code { margin-top: 16px; background: #2D2D4E; padding: 8px 16px; border-radius: 8px; font-size: 12px; color: #A78BFA; display: block; }
  </style>
</head>
<body>
  <h1>🌱 Scan with Expo Go</h1>
  <p>Open <strong>Expo Go</strong> on Android<br>and tap the QR scanner icon</p>
  <canvas id="c"></canvas>
  <code>exp://192.168.4.26:8081</code>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    QRCode.toCanvas(document.getElementById("c"), "exp://192.168.4.26:8081", { width: 280, margin: 2 }, function(){});
  </script>
</body>
</html>
